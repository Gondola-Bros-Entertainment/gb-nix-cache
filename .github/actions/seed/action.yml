name: 'Seed Nova Cache'
description: 'Push new Nix store paths to a nova-cache server, skipping paths already cached'

inputs:
  cache-url:
    description: 'Base URL of the nova-cache server (e.g. https://cache.novavero.ai)'
    required: true
  api-key:
    description: 'Bearer token for authenticating PUT requests'
    required: true
  paths:
    description: 'Nix store paths to push (space-separated). Defaults to all paths from the current nix-shell.'
    required: false
    default: ''
  parallel:
    description: 'Max concurrent uploads'
    required: false
    default: '32'

runs:
  using: 'composite'
  steps:
    - name: Seed cache
      shell: bash
      env:
        CACHE_URL: ${{ inputs.cache-url }}
        CACHE_API_KEY: ${{ inputs.api-key }}
        STORE_PATHS: ${{ inputs.paths }}
        PARALLEL: ${{ inputs.parallel }}
      run: |
        set -euo pipefail

        # --- Resolve store paths ---
        if [ -n "$STORE_PATHS" ]; then
          PATHS="$STORE_PATHS"
        elif [ -f shell.nix ] || [ -f default.nix ]; then
          PATHS=$(nix-store -qR $(nix-instantiate shell.nix 2>/dev/null || nix-instantiate default.nix 2>/dev/null) 2>/dev/null || true)
        else
          echo "::warning::No store paths provided and no shell.nix/default.nix found."
          exit 0
        fi

        if [ -z "$PATHS" ]; then
          echo "::warning::No store paths resolved."
          exit 0
        fi

        # Convert store paths to narinfo hashes (the 32-char prefix of each path)
        WORK=$(mktemp -d)
        trap "rm -rf $WORK" EXIT

        for p in $PATHS; do
          name=$(basename "$p")
          hash="${name%%-*}"
          echo "$hash"
        done | sort -u > "$WORK/local-hashes.txt"

        TOTAL=$(wc -l < "$WORK/local-hashes.txt" | tr -d ' ')
        echo "Resolved $TOTAL store paths"

        # --- Fetch cached hashes in a single request ---
        if curl -sf "$CACHE_URL/narinfo-hashes" -o "$WORK/remote-hashes.txt" 2>/dev/null; then
          sort -u "$WORK/remote-hashes.txt" > "$WORK/remote-sorted.txt"
        else
          # Endpoint unavailable (older server) — treat as empty cache
          touch "$WORK/remote-sorted.txt"
        fi

        # --- Diff: find hashes present locally but not in the remote cache ---
        comm -23 "$WORK/local-hashes.txt" "$WORK/remote-sorted.txt" > "$WORK/missing-hashes.txt"

        MISSING=$(wc -l < "$WORK/missing-hashes.txt" | tr -d ' ')
        echo "Already cached: $((TOTAL - MISSING)), to upload: $MISSING"

        if [ "$MISSING" -eq 0 ]; then
          echo "Cache is up to date."
          exit 0
        fi

        # --- Export only missing paths ---
        MISSING_PATHS=""
        for p in $PATHS; do
          name=$(basename "$p")
          hash="${name%%-*}"
          if grep -qxF "$hash" "$WORK/missing-hashes.txt"; then
            MISSING_PATHS="$MISSING_PATHS $p"
          fi
        done

        echo "Exporting $MISSING missing paths..."
        mkdir -p "$WORK/export"
        nix copy --to "file://$WORK/export" $MISSING_PATHS 2>/dev/null || true

        # --- Upload narinfos ---
        mkdir -p "$WORK/ok" "$WORK/fail"

        find "$WORK/export" -maxdepth 1 -name '*.narinfo' -exec basename {} .narinfo \; | \
          xargs -P "$PARALLEL" -I{} sh -c '
            code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $1" \
              --data-binary @"$2/export/{}.narinfo" \
              "$3/{}.narinfo") || true
            if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "204" ]; then
              touch "$2/ok/{}"
            else
              echo "$code" > "$2/fail/{}.narinfo"
            fi
            exit 0
          ' _ "$CACHE_API_KEY" "$WORK" "$CACHE_URL"

        NARINFO_OK=$(find "$WORK/ok" -type f | wc -l | tr -d ' ')
        NARINFO_FAIL=$(find "$WORK/fail" -name '*.narinfo' | wc -l | tr -d ' ')

        # --- Upload NARs ---
        for hash in $(find "$WORK/ok" -type f -exec basename {} \;); do
          url=$(grep -m1 '^URL:' "$WORK/export/$hash.narinfo" 2>/dev/null | sed 's/^URL: *//' || true)
          if [ -n "$url" ]; then
            basename "$url"
          fi
        done | sort -u > "$WORK/nars.txt"

        NAR_OK=0
        NAR_FAIL=0
        if [ -s "$WORK/nars.txt" ]; then
          cat "$WORK/nars.txt" | xargs -P "$PARALLEL" -I{} sh -c '
            if [ ! -f "$1/export/nar/{}" ]; then
              exit 0
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" -T "$1/export/nar/{}" \
              -H "Authorization: Bearer $2" \
              "$3/nar/{}") || true
            if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "204" ]; then
              touch "$1/ok/nar-{}"
            else
              echo "$code" > "$1/fail/nar-{}"
            fi
            exit 0
          ' _ "$WORK" "$CACHE_API_KEY" "$CACHE_URL"

          NAR_OK=$(find "$WORK/ok" -name 'nar-*' | wc -l | tr -d ' ')
          NAR_FAIL=$(find "$WORK/fail" -name 'nar-*' | wc -l | tr -d ' ')
        fi

        echo "Narinfo: $NARINFO_OK uploaded, $NARINFO_FAIL failed (skipped $((TOTAL - MISSING)) cached)"
        echo "Nar:     $NAR_OK uploaded, $NAR_FAIL failed"

        if [ "$NARINFO_FAIL" -gt 0 ] || [ "$NAR_FAIL" -gt 0 ]; then
          echo "::warning::Some uploads failed. Cache may be partially seeded."
        fi

        # --- Validate one round-trip ---
        if [ "$NARINFO_OK" -gt 0 ]; then
          SAMPLE=$(ls "$WORK/ok" | grep -v '^nar-' | head -1)
          FETCHED=$(curl -sf "$CACHE_URL/$SAMPLE.narinfo" || true)

          if [ -z "$FETCHED" ]; then
            echo "::warning::Validation failed: $SAMPLE.narinfo not retrievable"
          elif ! echo "$FETCHED" | grep -q '^Sig:'; then
            echo "::warning::Validation failed: no signature on $SAMPLE.narinfo"
          else
            LOCAL_SP=$(grep -m1 '^StorePath:' "$WORK/export/$SAMPLE.narinfo" || true)
            REMOTE_SP=$(echo "$FETCHED" | grep -m1 '^StorePath:' || true)
            if [ "$LOCAL_SP" != "$REMOTE_SP" ]; then
              echo "::warning::Validation failed: StorePath mismatch on $SAMPLE"
            else
              echo "Validation passed: $SAMPLE — content, signature, and NAR verified"
            fi
          fi
        fi
