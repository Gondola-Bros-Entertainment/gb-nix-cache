name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/", "exe/"]'
          fail-on: warning

  format:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/run-ormolu@v16
        with:
          pattern: |
            src/**/*.hs
            test/**/*.hs
            exe/**/*.hs

  build:
    name: Build
    needs: [lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-${{ hashFiles('gb-nix-cache.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.6.7-
      - name: Install system dependencies
        run: sudo apt-get install -y liblzma-dev
      - run: cabal build --only-dependencies
      - run: cabal build

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-${{ hashFiles('gb-nix-cache.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.6.7-
      - name: Install system dependencies
        run: sudo apt-get install -y liblzma-dev
      - run: cabal test --enable-tests

  warnings:
    name: Warnings
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-${{ hashFiles('gb-nix-cache.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.6.7-
      - name: Install system dependencies
        run: sudo apt-get install -y liblzma-dev
      - run: cabal build --ghc-options="-Wall -Werror"

  cabal-check:
    name: Cabal Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: '3.14'
      - run: cabal check

  deploy-server:
    name: Deploy Server
    needs: [test, warnings]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$OCI_SSH_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H "$OCI_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/oci_key "ubuntu@${OCI_HOST}" "\
            source ~/.ghcup/env && \
            cd ~/gb-nix-cache && \
            git pull && \
            cabal build --flag server --ghc-options='-Wall -Werror' && \
            BINARY=\$(cabal list-bin --flag server gb-nix-cache-server) && \
            sudo systemctl stop nix-cache.service && \
            sudo cp \"\$BINARY\" /usr/local/bin/gb-nix-cache-server && \
            sudo chmod +x /usr/local/bin/gb-nix-cache-server && \
            sudo systemctl start nix-cache.service && \
            sudo systemctl status nix-cache.service --no-pager"
