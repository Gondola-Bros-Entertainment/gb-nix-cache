name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Lint jobs (fast, Linux-only)
# ---------------------------------------------------------------------------

jobs:
  lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/", "exe/"]'
          fail-on: warning

  format:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/run-ormolu@v16
        with:
          pattern: |
            src/**/*.hs
            test/**/*.hs
            exe/**/*.hs

  # ---------------------------------------------------------------------------
  # Build + Test (cross-platform matrix)
  # ---------------------------------------------------------------------------

  build:
    name: Build (${{ matrix.name }})
    needs: [lint, format]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            compression: true
          - os: macos-latest
            name: macOS
            compression: true
          - os: windows-latest
            name: Windows
            compression: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-${{ runner.os }}-${{ hashFiles('nova-cache.cabal') }}
          restore-keys: cabal-${{ runner.os }}-

      - name: Install liblzma (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y liblzma-dev

      - name: Build
        run: cabal build --ghc-options="-Werror" ${{ matrix.compression == false && '-f-compression' || '' }}

      - name: Test
        run: cabal test ${{ matrix.compression == false && '-f-compression' || '' }}

  # ---------------------------------------------------------------------------
  # Packaging check (Linux-only)
  # ---------------------------------------------------------------------------

  cabal-check:
    name: Cabal Check
    needs: [lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'
      - run: cabal check

  # ---------------------------------------------------------------------------
  # Deploy (Linux, main branch only)
  # ---------------------------------------------------------------------------

  deploy-server:
    name: Deploy Server
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$OCI_SSH_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H "$OCI_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/oci_key "ubuntu@${OCI_HOST}" "\
            source ~/.ghcup/env && \
            cd ~/nova-cache && \
            git pull && \
            cabal build --flag server --ghc-options='-Wall -Werror' && \
            BINARY=\$(cabal list-bin --flag server nova-cache-server) && \
            sudo systemctl stop nix-cache.service && \
            sudo cp \"\$BINARY\" /usr/local/bin/nova-cache-server && \
            sudo chmod +x /usr/local/bin/nova-cache-server && \
            sudo systemctl start nix-cache.service && \
            sudo systemctl status nix-cache.service --no-pager"
